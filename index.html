<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css" integrity="sha384-GvrOXuhMATgEsSwCs4smul74iXGOixntILdUW9XmUC6+HX0sLNAK3q710xrm/QbB" crossorigin="anonymous">
    <meta name="theme-color" content="#000000">
    <link rel="apple-touch-icon" href="/icon-192.png">
    <title>Zentrack</title>
  </head>
  <body>
    <script>
      // FORCED CACHE CLEAR: Unregister all service workers to ensure the latest code is loaded.
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          let hasUnregistered = false;
          for (let registration of registrations) {
            registration.unregister();
            hasUnregistered = true;
          }
          if (hasUnregistered) {
            window.location.reload(true);
          }
        });
      }
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
