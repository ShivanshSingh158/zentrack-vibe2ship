steps:
  # 1. Install dependencies
  - name: 'node:20'
    entrypoint: 'npm'
    args: ['ci']
    id: 'install-dependencies'

  # 2. Run Tests (Simulated Vitest + Playwright)
  - name: 'node:20'
    entrypoint: 'npm'
    args: ['run', 'test']
    id: 'run-tests'
    waitFor: ['install-dependencies']

  # 3. Build Docker image for Cloud Run Orchestrator Agent
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/deadlinezero-orchestrator:$COMMIT_SHA', '.']
    id: 'build-orchestrator-docker'
    waitFor: ['run-tests']

  # 4. Push Docker image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/deadlinezero-orchestrator:$COMMIT_SHA']
    id: 'push-orchestrator-docker'
    waitFor: ['build-orchestrator-docker']

  # 5. Deploy Orchestrator to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'deadlinezero-orchestrator'
      - '--image'
      - 'gcr.io/$PROJECT_ID/deadlinezero-orchestrator:$COMMIT_SHA'
      - '--region'
      - 'us-central1'
      - '--min-instances'
      - '1'
      - '--max-instances'
      - '10'
    id: 'deploy-cloud-run'
    waitFor: ['push-orchestrator-docker']

  # 6. Deploy Cloud Functions & Firebase Hosting
  - name: 'gcr.io/$PROJECT_ID/firebase'
    entrypoint: 'firebase'
    args: ['deploy', '--project', '$PROJECT_ID', '--non-interactive']
    id: 'deploy-firebase'
    waitFor: ['run-tests']

images:
  - 'gcr.io/$PROJECT_ID/deadlinezero-orchestrator:$COMMIT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY
