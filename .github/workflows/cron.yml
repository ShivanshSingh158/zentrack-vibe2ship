name: Background Class Notifications Cron

on:
  schedule:
    # Runs every 5 minutes
    - cron: '*/5 * * * *'
  workflow_dispatch: # Allows manual triggering from the GitHub Actions tab for testing

jobs:
  ping_vercel:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Vercel Cron Endpoint
        run: |
          curl -f -X POST "https://myzentrack.vercel.app/api/cron-classes" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json"
